<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MK Jewels Recorder</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #0f0f0f;
    }

    main {
      width: min(720px, 100%);
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 6vw, 46px);
      line-height: 1.08;
      letter-spacing: 0;
      text-align: center;
    }

    .subheading,
    .label,
    #message {
      color: #888888;
    }

    .subheading {
      margin: 0 0 28px;
      font-size: 17px;
      text-align: center;
    }

    .label {
      margin: 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .screen {
      min-height: 420px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .screen-header {
      position: relative;
      margin-bottom: 12px;
    }

    .selection-list {
      display: grid;
      gap: 12px;
    }

    button {
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      color: #ffffff;
      background: #1a1a1a;
      transition: border-color 150ms ease, color 150ms ease, background 150ms ease;
    }

    button:hover:not(:disabled),
    button:focus-visible {
      border-color: #B8860B;
      color: #ffffff;
      outline: none;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .selection-button {
      width: 100%;
      min-height: 76px;
      padding: 18px 20px;
      text-align: left;
      border-left: 3px solid transparent;
    }

    .selection-button:hover,
    .selection-button:focus-visible {
      border-left-color: #B8860B;
      background: #202020;
    }

    .store-name,
    .salesperson-button-name {
      display: block;
      font-size: 20px;
      font-weight: 700;
    }

    .salesperson-button-designation {
      display: block;
      margin-top: 5px;
      color: #888888;
      font-size: 15px;
    }

    .back-button {
      position: absolute;
      top: 0;
      left: 0;
      min-width: 0;
      padding: 8px 0;
      border: 0;
      color: #888888;
      background: transparent;
      font-size: 16px;
      font-weight: 600;
    }

    .back-button:hover,
    .back-button:focus-visible {
      color: #B8860B;
    }

    .recording-card {
      display: grid;
      gap: 24px;
      text-align: center;
    }

    .identity-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      text-align: left;
    }

    .identity-item {
      min-width: 0;
      padding: 14px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #171717;
    }

    .identity-value {
      margin-top: 6px;
      font-size: 17px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    #startButton,
    #stopButton {
      min-width: 220px;
      padding: 18px 28px;
      font-size: 20px;
      font-weight: 700;
    }

    #startButton {
      border-color: #B8860B;
      background: #B8860B;
      color: #ffffff;
    }

    #startButton:hover:not(:disabled),
    #startButton:focus-visible {
      background: #9f7409;
    }

    #stopButton {
      border-color: #5c1e24;
      background: #3a1519;
    }

    .status-grid {
      display: grid;
      gap: 12px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #171717;
      text-align: left;
    }

    .status-row strong {
      color: #ffffff;
    }

    .connected {
      color: #B8860B;
      font-weight: 700;
    }

    .disconnected {
      color: #888888;
      font-weight: 700;
    }

    .recording {
      color: #B8860B;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    #message {
      min-height: 24px;
      margin: 0;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      main {
        padding: 22px;
      }

      .screen {
        min-height: 520px;
      }

      .screen-header {
        padding-top: 42px;
      }

      .identity-grid {
        grid-template-columns: 1fr;
      }

      .status-row {
        flex-direction: column;
        gap: 6px;
      }

      #startButton,
      #stopButton {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section id="storeScreen" class="screen" aria-labelledby="storeHeading">
      <div class="screen-header">
        <h1 id="storeHeading">MK Jewels — Select Store</h1>
      </div>
      <p id="storeLoading" class="subheading">Loading...</p>
      <div id="storeList" class="selection-list"></div>
    </section>

    <section id="salespersonScreen" class="screen hidden" aria-labelledby="salespersonHeading">
      <div class="screen-header">
        <button id="backToStoresButton" class="back-button" type="button">← Back</button>
        <h1 id="salespersonHeading">Select Your Name</h1>
        <p id="selectedStoreName" class="subheading"></p>
      </div>
      <p id="salespersonLoading" class="subheading">Loading...</p>
      <div id="salespersonList" class="selection-list"></div>
    </section>

    <section id="recordingScreen" class="screen hidden" aria-labelledby="recordingHeading">
      <div class="recording-card">
        <div>
          <h1 id="recordingHeading">Audio Recorder</h1>
          <p class="subheading">Live store conversation capture</p>
        </div>

        <div class="identity-grid">
          <div class="identity-item">
            <p class="label">Store</p>
            <div id="recordingStoreName" class="identity-value">Unknown</div>
          </div>
          <div class="identity-item">
            <p class="label">Salesperson</p>
            <div id="salespersonName" class="identity-value">Unknown</div>
          </div>
          <div class="identity-item">
            <p class="label">Designation</p>
            <div id="salespersonDesignation" class="identity-value">Unknown</div>
          </div>
        </div>

        <div class="controls">
          <button id="startButton" type="button">Start Recording</button>
          <button id="stopButton" type="button" class="hidden">Stop</button>
        </div>

        <div class="status-grid" aria-live="polite">
          <div class="status-row">
            <strong>Connection</strong>
            <span id="connectionStatus" class="disconnected">Disconnected</span>
          </div>
          <div class="status-row">
            <strong>Recording</strong>
            <span id="recordingStatus">Stopped</span>
          </div>
        </div>

        <div id="message"></div>
      </div>
    </section>
  </main>

  <script>
    const TARGET_SAMPLE_RATE = 16000;
    const WS_PORT = 8765;

    const storeScreen = document.getElementById("storeScreen");
    const salespersonScreen = document.getElementById("salespersonScreen");
    const recordingScreen = document.getElementById("recordingScreen");
    const storeLoading = document.getElementById("storeLoading");
    const storeList = document.getElementById("storeList");
    const salespersonLoading = document.getElementById("salespersonLoading");
    const salespersonList = document.getElementById("salespersonList");
    const selectedStoreNameElement = document.getElementById("selectedStoreName");
    const backToStoresButton = document.getElementById("backToStoresButton");
    const recordingStoreNameElement = document.getElementById("recordingStoreName");
    const salespersonNameElement = document.getElementById("salespersonName");
    const salespersonDesignationElement = document.getElementById("salespersonDesignation");
    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const connectionStatus = document.getElementById("connectionStatus");
    const recordingStatus = document.getElementById("recordingStatus");
    const message = document.getElementById("message");

    let selectedStore = null;
    let selectedSalesperson = null;
    let audioContext = null;
    let mediaStream = null;
    let sourceNode = null;
    let processorNode = null;
    let websocket = null;
    let recordingStartedAt = 0;
    let counterTimer = null;
    let isRecording = false;
    let userInitiatedStop = false;
    let reconnectAttempts = 0;
    const MAX_RECONNECT_ATTEMPTS = 5;

    backToStoresButton.addEventListener("click", () => {
      selectedSalesperson = null;
      showScreen(storeScreen);
    });
    startButton.addEventListener("click", startRecording);
    stopButton.addEventListener("click", () => {
      userInitiatedStop = true;
      stopRecording();
    });
    window.addEventListener("beforeunload", stopRecording);

    loadStores();

    async function loadStores() {
      storeLoading.textContent = "Loading...";
      storeLoading.classList.remove("hidden");
      storeList.innerHTML = "";

      try {
        const stores = await fetchJson("/api/stores");
        storeLoading.classList.add("hidden");

        if (!stores.length) {
          storeLoading.textContent = "No stores found.";
          storeLoading.classList.remove("hidden");
          return;
        }

        stores.forEach((store) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "selection-button";
          button.innerHTML = `<span class="store-name">${escapeHtml(store.name)}</span>`;
          button.addEventListener("click", () => selectStore(store));
          storeList.appendChild(button);
        });
      } catch (error) {
        storeLoading.textContent = `Unable to load stores: ${error.message}`;
      }
    }

    async function selectStore(store) {
      selectedStore = store;
      selectedSalesperson = null;
      selectedStoreNameElement.textContent = store.name;
      salespersonList.innerHTML = "";
      salespersonLoading.textContent = "Loading...";
      salespersonLoading.classList.remove("hidden");
      showScreen(salespersonScreen);

      try {
        const salespersons = await fetchJson(`/api/stores/${encodeURIComponent(store.id)}/salespersons`);
        salespersonLoading.classList.add("hidden");

        if (!salespersons.length) {
          salespersonLoading.textContent = "No salespersons found.";
          salespersonLoading.classList.remove("hidden");
          return;
        }

        salespersons.forEach((salesperson) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "selection-button";
          button.innerHTML = `
            <span class="salesperson-button-name">${escapeHtml(salesperson.name)}</span>
            <span class="salesperson-button-designation">${escapeHtml(salesperson.designation)}</span>
          `;
          button.addEventListener("click", () => selectSalesperson(salesperson));
          salespersonList.appendChild(button);
        });
      } catch (error) {
        salespersonLoading.textContent = `Unable to load salespersons: ${error.message}`;
      }
    }

    function selectSalesperson(salesperson) {
      selectedSalesperson = salesperson;
      recordingStoreNameElement.textContent = selectedStore.name;
      salespersonNameElement.textContent = salesperson.name;
      salespersonDesignationElement.textContent = salesperson.designation;
      message.textContent = "";
      showScreen(recordingScreen);
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      return response.json();
    }

    function showScreen(screen) {
      [storeScreen, salespersonScreen, recordingScreen].forEach((element) => {
        element.classList.toggle("hidden", element !== screen);
      });
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[character]));
    }

    function buildWebSocketUrl() {
      const salespersonName = selectedSalesperson.name.trim() || "Unknown";
      return `ws://${window.location.hostname}:${WS_PORT}?name=${encodeURIComponent(salespersonName)}&salesperson_id=${selectedSalesperson.id}&store_id=${selectedStore.id}`;
    }

    async function startRecording() {
      if (!selectedStore || !selectedSalesperson) {
        message.textContent = "Select a store and salesperson before recording.";
        return;
      }

      startButton.disabled = true;
      userInitiatedStop = false;
      reconnectAttempts = 0;
      message.textContent = "Requesting microphone permission...";

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        connectWebSocket();
      } catch (error) {
        message.textContent = `Unable to start recording: ${error.message}`;
        cleanup();
      }
    }

    function connectWebSocket() {
      websocket = new WebSocket(buildWebSocketUrl());
      websocket.binaryType = "arraybuffer";

      websocket.addEventListener("open", () => {
        reconnectAttempts = 0;
        setConnectionStatus(true);
        if (isRecording) {
          message.textContent = "";
        } else {
          startAudioPipeline();
        }
      });

      websocket.addEventListener("close", () => {
        setConnectionStatus(false);
        if (isRecording && !userInitiatedStop) {
          scheduleReconnect();
        } else {
          cleanup();
        }
      });

      websocket.addEventListener("error", () => {
        setConnectionStatus(false);
        if (!isRecording) {
          message.textContent = "WebSocket error. Check the recorder backend.";
          cleanup();
        }
      });
    }

    function scheduleReconnect() {
      if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
        message.textContent = `Connection failed after ${MAX_RECONNECT_ATTEMPTS} attempts. Tap Start to retry.`;
        cleanup();
        reconnectAttempts = 0;
        return;
      }

      reconnectAttempts += 1;
      const delaySeconds = Math.min(2 ** (reconnectAttempts - 1), 16);
      message.textContent = `Connection lost. Reconnecting in ${delaySeconds}s... (attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`;

      window.setTimeout(() => {
        if (isRecording && !userInitiatedStop) {
          connectWebSocket();
        }
      }, delaySeconds * 1000);
    }

    function startAudioPipeline() {
      audioContext = new (window.AudioContext || window.webkitAudioContext)({
        sampleRate: TARGET_SAMPLE_RATE
      });

      sourceNode = audioContext.createMediaStreamSource(mediaStream);
      processorNode = audioContext.createScriptProcessor(4096, 1, 1);

      processorNode.onaudioprocess = (event) => {
        if (!isRecording || !websocket || websocket.readyState !== WebSocket.OPEN) {
          return;
        }

        const input = event.inputBuffer.getChannelData(0);
        const pcm = floatToInt16Pcm(input, audioContext.sampleRate, TARGET_SAMPLE_RATE);
        websocket.send(pcm.buffer);
      };

      sourceNode.connect(processorNode);
      processorNode.connect(audioContext.destination);

      isRecording = true;
      recordingStartedAt = Date.now();
      startButton.classList.add("hidden");
      stopButton.classList.remove("hidden");
      startButton.disabled = false;
      message.textContent = "";
      updateRecordingCounter();
      counterTimer = window.setInterval(updateRecordingCounter, 1000);
    }

    function stopRecording(reason) {
      if (reason) {
        message.textContent = reason;
      }
      cleanup();
    }

    function cleanup() {
      isRecording = false;

      if (counterTimer) {
        window.clearInterval(counterTimer);
        counterTimer = null;
      }

      if (processorNode) {
        processorNode.disconnect();
        processorNode.onaudioprocess = null;
        processorNode = null;
      }

      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode = null;
      }

      if (audioContext && audioContext.state !== "closed") {
        audioContext.close();
      }
      audioContext = null;

      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
        mediaStream = null;
      }

      if (websocket && websocket.readyState === WebSocket.OPEN) {
        websocket.close();
      }
      websocket = null;

      startButton.disabled = false;
      startButton.classList.remove("hidden");
      stopButton.classList.add("hidden");
      recordingStatus.textContent = "Stopped";
      recordingStatus.className = "";
      setConnectionStatus(false);
    }

    function updateRecordingCounter() {
      const elapsedSeconds = Math.floor((Date.now() - recordingStartedAt) / 1000);
      recordingStatus.textContent = `Recording... ${elapsedSeconds} seconds`;
      recordingStatus.className = "recording";
    }

    function setConnectionStatus(connected) {
      connectionStatus.textContent = connected ? "Connected" : "Disconnected";
      connectionStatus.className = connected ? "connected" : "disconnected";
    }

    function floatToInt16Pcm(float32Samples, inputSampleRate, outputSampleRate) {
      const samples = inputSampleRate === outputSampleRate
        ? float32Samples
        : downsampleBuffer(float32Samples, inputSampleRate, outputSampleRate);
      const pcm = new Int16Array(samples.length);

      for (let index = 0; index < samples.length; index += 1) {
        const sample = Math.max(-1, Math.min(1, samples[index]));
        pcm[index] = sample < 0 ? sample * 32768 : sample * 32767;
      }

      return pcm;
    }

    function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
      if (outputSampleRate >= inputSampleRate) {
        return buffer;
      }

      const ratio = inputSampleRate / outputSampleRate;
      const newLength = Math.round(buffer.length / ratio);
      const result = new Float32Array(newLength);
      let offsetResult = 0;
      let offsetBuffer = 0;

      while (offsetResult < result.length) {
        const nextOffsetBuffer = Math.round((offsetResult + 1) * ratio);
        let accumulator = 0;
        let count = 0;

        for (let index = offsetBuffer; index < nextOffsetBuffer && index < buffer.length; index += 1) {
          accumulator += buffer[index];
          count += 1;
        }

        result[offsetResult] = count > 0 ? accumulator / count : 0;
        offsetResult += 1;
        offsetBuffer = nextOffsetBuffer;
      }

      return result;
    }
  </script>
</body>
</html>
